<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Jorge López Molina</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #080808;
      --ink:  #EEECEA;
      --i80:  rgba(238,236,234,0.85);
      --i60:  rgba(238,236,234,0.72);
      --i40:  rgba(238,236,234,0.55);
      --i20:  rgba(238,236,234,0.38);
      --i10:  rgba(238,236,234,0.10);
      --i06:  rgba(238,236,234,0.06);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --eout: cubic-bezier(0.16, 1, 0.30, 1);
      --font: -apple-system, BlinkMacSystemFont, 'Manrope', system-ui, sans-serif;
    }

    html { cursor: none; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    ::selection { background: rgba(238,236,234,0.10); }
    a { cursor: none; text-decoration: none; }

    /* ─── Cursor ─── */
    #cur {
      position: fixed; z-index: 9999; pointer-events: none;
      width: 7px; height: 7px; background: var(--ink); border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: width .22s var(--ease), height .22s var(--ease), opacity .2s;
      will-change: left, top;
    }
    #cur-ring {
      position: fixed; z-index: 9998; pointer-events: none;
      width: 28px; height: 28px; border: 1px solid var(--i40); border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: width .45s var(--ease), height .45s var(--ease), border-color .3s;
      will-change: left, top;
    }
    body.hov #cur { width: 0; height: 0; opacity: 0; }
    body.hov #cur-ring { width: 46px; height: 46px; border-color: var(--i20); }

    /* ─── Reveal ─── */
    .rv {
      opacity: 0; transform: translateY(20px);
      transition: opacity .9s var(--eout), transform .9s var(--eout);
    }
    .rv.in { opacity: 1; transform: none; }

    /* ─── Layout ─── */
    .scene {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 2.5rem;
      max-width: 520px;
      width: 100%;
    }

    .ghost {
      position: absolute;
      right: -1.5rem; top: 50%;
      transform: translateY(-50%);
      font-size: clamp(9rem, 28vw, 18rem);
      font-weight: 200; letter-spacing: -.06em; line-height: 1;
      color: rgba(238,236,234,0.028);
      pointer-events: none; user-select: none;
      white-space: nowrap;
    }

    .label {
      font-size: .7rem; font-weight: 500; letter-spacing: .18em;
      text-transform: uppercase; color: var(--i20);
      margin-bottom: 1.4rem;
    }

    .heading {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 200; letter-spacing: -.032em; line-height: .95;
      margin-bottom: 1.5rem;
    }

    .desc {
      font-size: 1rem; font-weight: 300; color: var(--i60);
      line-height: 1.8; letter-spacing: .01em;
      max-width: 340px;
      margin-bottom: 2.4rem;
    }

    .back {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .84rem; font-weight: 300; color: var(--i40);
      letter-spacing: .04em;
      border: 1px solid var(--i10);
      border-radius: 100px;
      padding: .55rem 1.2rem;
      transition: color .3s var(--ease), border-color .3s var(--ease);
    }
    .back:hover { color: var(--ink); border-color: var(--i40); }

    @media (max-width: 480px) {
      .ghost { display: none; }
      .scene { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<div class="scene">
  <span class="ghost">404</span>

  <p class="label rv" style="transition-delay:.05s">Error</p>
  <h1 class="heading rv" style="transition-delay:.12s">Page not<br>found.</h1>
  <p class="desc rv" style="transition-delay:.2s">
    The page you are looking for does not exist or has been moved.
  </p>
  <a class="back rv" href="index.html" style="transition-delay:.28s">← Back to work</a>
</div>

<script>
(function () {
  const cur = document.getElementById('cur');
  const ring = document.getElementById('cur-ring');
  let mx = -300, my = -300, rx = -300, ry = -300;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px'; cur.style.top = my + 'px';
  }, { passive: true });
  (function tick() {
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(tick);
  })();
  document.querySelectorAll('a').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hov'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hov'));
  });

  requestAnimationFrame(() => {
    document.querySelectorAll('.rv').forEach(el => el.classList.add('in'));
  });
})();
</script>
</body>
</html>
